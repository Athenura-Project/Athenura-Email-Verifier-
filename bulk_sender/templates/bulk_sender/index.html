<!-- <h1>Bulk Email Sender</h1> -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Email Sender</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-4xl mx-auto">
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-slate-800 text-center mb-8">Bulk Email Sender</h1>
            <nav class="bg-white border-b border-slate-100 sticky top-0 z-50 shadow-sm rounded-lg">
    <div class="max-w-6xl mx-auto px-4 md:px-8 rounded-lg">
        <div class="flex justify-between items-center h-16 rounded-lg">
            
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-1.5 rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                    </svg>
                </div>
                <span class="text-lg font-bold text-slate-800 tracking-tight">Mail<span class="text-blue-600">Master</span></span>
            </div>

           <div class="max-w-4xl mx-auto">
    <div class="flex items-center justify-center gap-1 bg-slate-200/50 p-1.5 rounded-2xl w-fit mx-auto border border-slate-200 shadow-inner">
        
        <a href="/email_verifier" 
           class="flex items-center gap-2 px-6 py-2.5 rounded-xl text-sm font-bold transition-all duration-200
           {% if request.path == '/email_verifier/' %} 
               bg-white text-blue-600 shadow-sm 
           {% else %} 
               text-slate-500 hover:text-slate-700 hover:bg-slate-200/50 
           {% endif %}">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            Verifier
        </a>

        <a href="/bulk_sender" 
           class="flex items-center gap-2 px-6 py-2.5 rounded-xl text-sm font-bold transition-all duration-200
           {% if '/bulk_sender' in request.path %} 
               bg-white text-blue-600 shadow-sm 
           {% else %} 
               text-slate-500 hover:text-slate-700 hover:bg-slate-200/50 
           {% endif %}">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
            </svg>
            Bulk Sender
        </a>
    </div>
</div>

            <div class="hidden md:flex items-center gap-2 bg-green-50 px-3 py-1 rounded-full border border-green-100">
                <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
                <span class="text-[10px] font-bold text-green-700 uppercase">System Ready</span>
            </div>

        </div>
    </div>
</nav>
            <p class="text-slate-500 text-sm mt-1">Send messages to all your verified contacts at once.</p>
        </div>

       <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
    <form method="POST" action="" class="p-8 space-y-6">
        {% csrf_token %}

        <div>
            <div class="flex justify-between items-center mb-2">
                <label class="text-sm font-semibold text-slate-700">Recipients (Verified List)</label>
                <span class="bg-blue-100 text-blue-700 text-[10px] font-bold px-2 py-1 rounded-md uppercase">
                    {{ valid_count }} Emails Ready
                </span>
            </div>
            
            <div class="relative group">
                <textarea 
                    name="recipient_list" 
                    readonly 
                    class="w-full h-32 p-4 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-500 focus:outline-none cursor-not-allowed leading-relaxed shadow-inner"
                    placeholder="No valid emails available. Please verify a list first.">{% if emails_string %}{{ emails_string }}{% endif %}</textarea>
                
                <div class="absolute inset-y-0 right-0 w-8 bg-gradient-to-l from-slate-50 to-transparent rounded-r-xl pointer-events-none"></div>
            </div>
            <p class="text-[11px] text-slate-400 mt-2 flex items-center gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m0 0v3m0-3h3m-3 0h-3m2-5a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                These emails are pulled directly from your successful verification.
            </p>
        </div>

        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">Subject</label>
            <input 
                type="text" 
                name="subject" 
                required 
                class="w-full p-3 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                placeholder="Enter email subject line">
        </div>

        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">Message Body</label>
            <textarea 
                name="message" 
                required 
                rows="5"
                class="w-full p-4 border border-slate-200 rounded-xl text-sm text-slate-700 focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                placeholder="Write your email content here..."></textarea>
        </div>

       <div class="pt-4 flex gap-4">
    <button type="submit" class="flex-[3] bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-100 transition-all flex items-center justify-center gap-3 active:scale-[0.98]">
        <span>Send Bulk Campaign</span>
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
        </svg>
    </button>

    <button type="reset" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 font-semibold py-4 rounded-xl transition-all active:scale-[0.98]">
        Clear
    </button>
</div>
    </form>
</div>
<div class="mt-6 flex items-center px-4">
    <div class="flex items-center gap-2 text-slate-400 text-[11px]">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span>Server: SMTP Active</span>
    </div>   
</div>

</body>
</html>
