{% extends "website/base.html" %}

{% block title %}Reset Password | {{ block.super }}{% endblock %}

{% block content %}

<main class="flex-grow flex items-center justify-center p-6">
  <div class="w-full max-w-md">
    <div
      class="bg-white dark:bg-slate-900 p-12 rounded-[2rem] shadow-2xl shadow-slate-200/50 dark:shadow-none border border-slate-100 dark:border-white/5"
    >
      <!-- Header -->
      <div class="text-center mb-8">
        <h2 class="font-bold text-slate-900 dark:text-white mb-2 text-4xl">
          Reset Password
        </h2>
        <p class="text-slate-500 dark:text-slate-400 text-sm">
          Choose a new password for your account.
        </p>
      </div>

      <!-- FORM -->
      <form method="POST" class="space-y-6">
        {% csrf_token %}

        <!-- New Password -->
        <div class="space-y-2 relative">
          <label
            class="text-sm font-semibold text-slate-700 dark:text-slate-200"
          >
            New Password
          </label>
          <input
            type="password"
            id="password1"
            name="password1"
            required
            class="w-full bg-slate-50 dark:bg-[#362720] border border-slate-200 dark:border-white/10 rounded-lg h-12 px-4 pr-12 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all text-slate-900 dark:text-white"
            placeholder="••••••••"
          />
          <button
            type="button"
            class="absolute right-3 top-1/2 -translate-y-3/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-300"
            onclick="togglePassword('password1', this)"
          >
            <span class="material-symbols-outlined text-[20px]"
              >visibility</span
            >
          </button>
        </div>

        <!-- Confirm Password -->
        <div class="space-y-2 relative">
          <label
            class="text-sm font-semibold text-slate-700 dark:text-slate-200"
          >
            Confirm New Password
          </label>
          <input
            type="password"
            id="password2"
            name="password2"
            required
            class="w-full bg-slate-50 dark:bg-[#362720] border border-slate-200 dark:border-white/10 rounded-lg h-12 px-4 pr-12 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all text-slate-900 dark:text-white"
            placeholder="••••••••"
          />
          <button
            type="button"
            class="absolute right-3 top-1/2 -translate-y-3/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-300"
            onclick="togglePassword('password2', this)"
          >
            <span class="material-symbols-outlined text-[20px]"
              >visibility</span
            >
          </button>
        </div>

        <!-- Submit -->
        <button
          type="submit"
          class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-2xl shadow-xl shadow-primary/30 transition-all transform active:scale-[0.98] text-lg"
        >
          Reset Password
        </button>

        <!-- Back -->
        <div class="text-center pt-2">
          <a
            href="{% url 'account:signin' %}"
            class="text-sm font-semibold text-primary hover:underline flex items-center justify-center gap-1 group"
          >
            <span
              class="material-symbols-outlined text-[18px] group-hover:-translate-x-1 transition-transform"
            >
              arrow_back
            </span>
            Back to Login
          </a>
        </div>
      </form>
    </div>
  </div>
</main>

{% endblock %}
