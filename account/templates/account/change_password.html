{% extends "website/base.html" %} {% block content %}

<main class="py-12 px-4 sm:px-6">
  <div class="max-w-xl mx-auto">
    <div class="mb-8">
      <h1 class="text-3xl font-bold text-slate-800 tracking-tight">
        Change Password
      </h1>
      <p class="text-slate-500 mt-1">Update your account security</p>
    </div>

    <section
      class="bg-white rounded-xl border border-borderLight shadow-sm overflow-hidden"
    >
      <div class="p-8">
        <form method="POST" class="space-y-6">
          {% csrf_token %}

          <!-- Current Password -->
          <div class="space-y-1.5 relative">
            <label class="block text-sm font-semibold text-slate-700">
              Current Password
            </label>
            <input
              type="password"
              id="current_password"
              name="current_password"
              class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none pr-12"
              placeholder="Enter current password"
            />
            <button
              type="button"
              class="absolute right-3 top-1/2 -translate-y-3/2 text-slate-400 hover:text-slate-600"
              onclick="togglePassword('current_password', this)"
            >
              <span class="material-symbols-outlined text-[20px]"
                >visibility</span
              >
            </button>
          </div>

          <!-- New Password -->
          <div class="space-y-1.5 relative">
            <label class="block text-sm font-semibold text-slate-700">
              New Password
            </label>
            <input
              type="password"
              id="new_password"
              name="new_password"
              class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none pr-12"
              placeholder="New Password"
            />
            <button
              type="button"
              class="absolute right-3 top-1/2 -translate-y-3/2 text-slate-400 hover:text-slate-600"
              onclick="togglePassword('new_password', this)"
            >
              <span class="material-symbols-outlined text-[20px]"
                >visibility</span
              >
            </button>
          </div>

          <!-- Confirm Password -->
          <div class="space-y-1.5 relative">
            <label class="block text-sm font-semibold text-slate-700">
              Confirm New Password
            </label>
            <input
              type="password"
              id="confirm_password"
              name="confirm_password"
              class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none pr-12"
              placeholder="Confirm your new password"
            />
            <button
              type="button"
              class="absolute right-3 top-1/2 -translate-y-3/2 text-slate-400 hover:text-slate-600"
              onclick="togglePassword('confirm_password', this)"
            >
              <span class="material-symbols-outlined text-[20px]"
                >visibility</span
              >
            </button>
          </div>

          <!-- Buttons -->
          <div class="pt-4 flex flex-col sm:flex-row gap-3">
            <button
              type="submit"
              class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-6 py-3 rounded-lg transition-all shadow-md active:scale-[0.98]"
            >
              Update Password
            </button>

            <a
              href="{% url 'home' %}"
              class="px-6 py-3 border border-gray-300 text-slate-600 font-semibold rounded-lg hover:bg-gray-50 transition-colors"
            >
              Cancel
            </a>
          </div>
        </form>
      </div>
    </section>
  </div>
</main>

{% endblock %}
