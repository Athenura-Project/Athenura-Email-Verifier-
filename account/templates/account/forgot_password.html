{% extends "website/base.html" %} {% block content %}

<main class="flex-grow flex items-center justify-center p-4 sm:p-6 lg:p-8">
  <div class="w-full max-w-lg">
    <div
      class="bg-white dark:bg-zinc-900/50 rounded-xl shadow-xl border border-zinc-200 dark:border-zinc-800 overflow-hidden"
    >
      <div class="p-8 sm:p-12">
        <!-- Header -->
        <div class="text-center mb-10">
          <div
            class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-indigo-50 dark:bg-indigo-900/20 text-primary mb-6"
          >
            <span class="material-symbols-outlined text-4xl">lock_reset</span>
          </div>

          <h1
            class="text-3xl font-extrabold text-zinc-900 dark:text-white tracking-tight mb-3"
          >
            Forgot Password
          </h1>

          <p class="text-zinc-500 dark:text-zinc-400 text-base leading-relaxed">
            Enter your email and we’ll send you a reset link.
          </p>
        </div>

        <!-- FORM -->
        <form method="POST" class="space-y-6">
          {% csrf_token %}

          <div>
            <label class="block text-sm font-semibold mb-2">
              Email Address
            </label>

            <div class="relative">
              <input
                type="email"
                name="email"
                required
                class="block w-full px-4 py-3.5 bg-zinc-50 dark:bg-zinc-800 border rounded-xl focus:ring-2 focus:ring-primary focus:border-primary transition-all"
                placeholder="example@gmail.com"
              />
            </div>
          </div>

          <button
            type="submit"
            class="w-full py-4 rounded-xl bg-primary text-white font-bold hover:bg-primary/90 transition-all shadow-lg"
          >
            Send Reset Link
          </button>
        </form>

        <div class="mt-10 text-center">
          <a
            href="{% url 'account:signin' %}"
            class="text-zinc-500 hover:text-primary font-medium"
          >
            ← Back to Signin
          </a>
        </div>
      </div>
    </div>
  </div>
</main>

{% endblock %}
