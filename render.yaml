services:
  - type: web
    name: email-verifier
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python manage.py migrate && python manage.py collectstatic --noinput
    startCommand: gunicorn email_system.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: email-redis
          property: connectionString

  - type: worker
    name: celery-worker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A email_system worker -l info --concurrency=2
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: email-redis
          property: connectionString

  - type: redis
    name: email-redis
    plan: free
    ipAllowList: []